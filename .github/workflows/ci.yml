name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm ci may fail when package-lock.json was generated on a
        # different OS (Windows/macOS) and is missing platform-specific
        # optional dependencies for Linux.  Falling back to npm install
        # resolves native binaries for the current platform while still
        # respecting the lock file versions.
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values so build doesn't fail on missing env vars
          Q360_BASE_URL: https://example.com
          Q360_API_USERNAME: ci
          Q360_API_PASSWORD: ci
          GEMINI_API_KEY: ci-placeholder
